baseurl = "/"
languageCode = "en-US"
title = "Dahir"
theme = "hugo-lithium"
ignoreFiles = ["\\.Rmd$", "\\.Rmarkdown$", "_cache$"]

[permalinks]
    post = "/:year/:month/:day/:slug/"

[[menu.main]]
    name = "Home"
    url = "/"
[[menu.main]]
    name = "About"
    url = "/about/"
[[menu.main]]
    name = "GitHub"
    url = "https://github.com/abdirashiddahir"

[params]
    description = "Abdirashid M. Dahir — Advanced Mobility Engineer"
    highlightjsVersion = "9.12.0"
    highlightjsCDN = "//cdnjs.cloudflare.com/ajax/libs"
    highlightjsLang = ["r", "yaml", "python", "bash", "json"]
    highlightjsTheme = "github"

    [params.logo]
        url = "logo.png"
        width = 50
        height = 50
        alt = "Logo"

[markup]
  defaultMarkdownHandler = "goldmark"
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    codeFences = false
